<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#0c0c0e"/>
  <title>NekoApis · Docs</title>
  <link rel="icon" href="/src/icon.jpg" type="image/jpeg"/>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css"/>
  <script defer src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/highlight.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/json.min.js"></script>

  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

    :root{
      --bg:  #0c0c0e;
      --bg2: #111116;
      --bg3: #16161d;
      --bg4: #1c1c25;
      --ln:  #1f1f28;
      --ln2: #292935;
      --ln3: #343445;
      --fg:  #c8c8d8;
      --fg2: #7070a0;
      --fg3: #404058;
      --acc: #a78bfa;
      --acc2:#7c3aed;
      --grn: #34d399;
      --red: #f87171;
      --ylw: #fbbf24;
      --cyn: #67e8f9;
      --orn: #fb923c;
      --f:   'Fira Code', monospace;
    }

    html{scroll-behavior:smooth}
    body{
      background:var(--bg);color:var(--fg);
      font-family:var(--f);font-size:13px;
      min-height:100vh;-webkit-font-smoothing:antialiased;
      background-image:repeating-linear-gradient(
        0deg,transparent,transparent 2px,
        rgba(255,255,255,.011) 2px,rgba(255,255,255,.011) 4px
      );
    }
    ::-webkit-scrollbar{width:3px}
    ::-webkit-scrollbar-track{background:var(--bg)}
    ::-webkit-scrollbar-thumb{background:var(--ln2)}

    /* HEADER */
    header{
      position:sticky;top:0;z-index:50;
      background:rgba(12,12,14,.93);
      backdrop-filter:blur(14px);
      border-bottom:1px solid var(--ln);
    }
    .hdr{
      max-width:820px;margin:0 auto;padding:0 20px;
      height:50px;display:flex;align-items:center;justify-content:space-between;
    }
    .logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--fg)}
    .logo-sig{font-size:14px;font-weight:600;letter-spacing:-.4px}
    .logo-sig em{color:var(--acc);font-style:normal}
    .logo-v{font-size:10px;color:var(--fg3);padding:2px 6px;border:1px solid var(--ln2);border-radius:3px;letter-spacing:.5px}
    .hdr-r{display:flex;align-items:center;gap:8px}
    .hdr-back{
      color:var(--fg2);text-decoration:none;font-size:11px;
      padding:5px 10px;border-radius:4px;border:1px solid var(--ln2);
      transition:all .15s;display:flex;align-items:center;gap:5px;
    }
    .hdr-back:hover{color:var(--fg);border-color:var(--ln3)}
    .btn-menu{
      background:var(--bg3);border:1px solid var(--ln2);color:var(--fg2);
      padding:5px 10px;border-radius:4px;cursor:pointer;font-family:var(--f);
      font-size:11px;display:flex;align-items:center;gap:5px;
      transition:all .15s;
    }
    .btn-menu:hover{color:var(--fg);border-color:var(--ln3)}

    /* SIDEBAR */
    #sidebar{
      position:fixed;top:0;right:0;height:100%;width:240px;
      background:var(--bg2);border-left:1px solid var(--ln);
      transform:translateX(100%);transition:transform .26s cubic-bezier(.4,0,.2,1);
      z-index:100;
    }
    #sidebar.open{transform:translateX(0)}
    .sb-head{
      padding:14px 18px;border-bottom:1px solid var(--ln);
      display:flex;align-items:center;justify-content:space-between;
    }
    .sb-title{font-size:10px;color:var(--fg3);letter-spacing:1.5px;text-transform:uppercase}
    .btn-close{
      background:var(--bg3);border:1px solid var(--ln2);color:var(--fg2);
      width:28px;height:28px;border-radius:4px;cursor:pointer;font-size:14px;
      display:flex;align-items:center;justify-content:center;transition:all .15s;
    }
    .btn-close:hover{color:var(--fg)}
    .sb-body{padding:18px}
    .sb-sec{margin-bottom:20px}
    .sb-lbl{font-size:9px;color:var(--fg3);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px}
    .sb-lbl::before{content:'//  ';color:var(--acc)}
    .sb-a{
      display:flex;align-items:center;gap:8px;padding:7px 10px;
      color:var(--fg2);text-decoration:none;font-size:12px;border-radius:4px;
      border:1px solid transparent;margin-bottom:3px;transition:all .15s;
    }
    .sb-a::before{content:'›';color:var(--fg3);font-size:14px}
    .sb-a:hover{color:var(--fg);background:var(--bg3);border-color:var(--ln2)}
    #overlay{
      position:fixed;inset:0;background:rgba(0,0,0,.65);
      opacity:0;visibility:hidden;transition:opacity .26s,visibility .26s;z-index:90;
    }
    #overlay.show{opacity:1;visibility:visible}

    /* MAIN */
    main{max-width:820px;margin:0 auto;padding:28px 20px 60px}

    /* NOTIF */
    .notif-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
    .notif-ttl{font-size:10px;color:var(--fg3);letter-spacing:1.5px;text-transform:uppercase}
    .notif-ttl::before{content:'[!] ';color:var(--ylw)}
    .badge{
      font-size:9px;font-weight:700;background:var(--acc);color:var(--bg);
      padding:2px 7px;border-radius:3px;display:none;
    }
    .notif-item{
      background:var(--bg2);border:1px solid var(--ln);border-radius:4px;
      padding:12px 14px;margin-bottom:5px;font-size:11px;
      border-left:2px solid var(--acc);transition:border-color .15s;
    }
    .notif-item:hover{border-left-color:var(--grn)}
    .notif-row{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
    .notif-body-title{color:var(--fg);font-weight:600;margin-bottom:3px}
    .notif-body-msg{color:var(--fg2);line-height:1.6}
    .notif-meta{display:flex;align-items:center;gap:6px;flex-shrink:0}
    .notif-dot{width:5px;height:5px;border-radius:50%;background:var(--grn);flex-shrink:0}
    .notif-date{font-size:10px;color:var(--fg3);white-space:nowrap}

    /* SEARCH */
    .search-wrap{position:relative;margin:20px 0 18px}
    .search-wrap::before{
      content:'> search_';
      position:absolute;left:12px;top:50%;transform:translateY(-50%);
      color:var(--acc);font-size:11px;pointer-events:none;white-space:nowrap;
    }
    #searchInput{
      width:100%;padding:11px 14px 11px 96px;
      background:var(--bg2);border:1px solid var(--ln);border-radius:4px;
      color:var(--fg);font-size:12px;font-family:var(--f);
      outline:none;transition:border-color .15s;
    }
    #searchInput::placeholder{color:var(--fg3)}
    #searchInput:focus{border-color:var(--acc)}

    /* CATEGORY */
    .cat-group{margin-bottom:6px}
    .cat-btn{
      width:100%;background:var(--bg2);border:1px solid var(--ln);
      border-radius:4px;padding:0;cursor:pointer;text-align:left;
      color:var(--fg);transition:border-color .15s,background .15s;
      overflow:hidden;
    }
    .cat-btn:hover{border-color:var(--ln2);background:var(--bg3)}
    .cat-inner{
      padding:12px 14px;
      display:flex;align-items:center;justify-content:space-between;gap:10px;
    }
    .cat-left{display:flex;align-items:center;gap:10px;min-width:0}
    .cat-sym{
      font-size:12px;color:var(--acc);flex-shrink:0;width:20px;text-align:center;
      font-weight:700;
    }
    .cat-name{font-size:13px;font-weight:600;color:var(--fg)}
    .cat-meta{display:flex;align-items:center;gap:8px;flex-shrink:0}
    .cat-count{
      font-size:10px;color:var(--fg3);padding:1px 7px;
      background:var(--bg3);border:1px solid var(--ln2);border-radius:3px;
      white-space:nowrap;
    }
    .cat-arr{font-size:14px;color:var(--fg3);transition:transform .2s}
    .cat-arr.open{transform:rotate(90deg)}

    .cat-body{display:none;border:1px solid var(--ln);border-top:none;border-radius:0 0 4px 4px;overflow:hidden}
    .cat-body.show{display:block}

    /* ENDPOINT ROW */
    .ep-item{border-top:1px solid var(--ln);transition:background .12s}
    .ep-item:hover{background:rgba(167,139,250,.03)}
    .ep-btn{
      width:100%;background:transparent;border:none;
      padding:0;cursor:pointer;text-align:left;color:var(--fg);
      font-family:var(--f);
    }
    .ep-row{
      display:flex;align-items:center;gap:0;
      padding:10px 0 10px 14px;min-width:0;
    }

    /* method pill */
    .m-pill{
      font-size:9px;font-weight:700;letter-spacing:.8px;
      padding:2px 7px;border-radius:3px;flex-shrink:0;
      min-width:44px;text-align:center;
    }
    .GET  {background:rgba(52,211,153,.1); color:var(--grn);border:1px solid rgba(52,211,153,.2)}
    .POST {background:rgba(103,232,249,.1);color:var(--cyn);border:1px solid rgba(103,232,249,.2)}
    .PUT  {background:rgba(251,191,36,.1); color:var(--ylw);border:1px solid rgba(251,191,36,.2)}
    .DELETE{background:rgba(248,113,113,.1);color:var(--red);border:1px solid rgba(248,113,113,.2)}

    .ep-sep{color:var(--fg3);padding:0 8px;font-size:12px;flex-shrink:0}

    .ep-path{
      font-size:12px;font-weight:500;color:var(--fg);
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0;
    }
    .ep-path .seg{color:var(--fg2)}
    .ep-path .param-seg{color:var(--cyn)}

    .ep-right{
      display:flex;align-items:center;gap:6px;
      padding-right:14px;flex-shrink:0;
    }
    .ep-name{font-size:10px;color:var(--fg3);max-width:140px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .st-badge{
      font-size:9px;padding:1px 6px;border-radius:3px;flex-shrink:0;letter-spacing:.5px;
    }
    .st-ready  {color:var(--grn);background:rgba(52,211,153,.08);border:1px solid rgba(52,211,153,.15)}
    .st-deprecated{color:var(--ylw);background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.15)}
    .ep-chev{color:var(--fg3);font-size:12px;transition:transform .18s;flex-shrink:0}
    .ep-chev.open{transform:rotate(90deg)}

    /* DETAIL */
    .ep-detail{
      display:none;background:var(--bg3);border-top:1px solid var(--ln);
      padding:18px 14px 18px 18px;
    }
    .ep-detail.show{display:block}
    .ep-desc{font-size:11px;color:var(--fg2);line-height:1.75;margin-bottom:16px;padding-left:2px}
    .ep-desc::before{content:'/* ';color:var(--fg3)}
    .ep-desc::after{content:' */';color:var(--fg3)}

    /* DETAIL SECTIONS */
    .ds{margin-bottom:18px}
    .ds-lbl{
      font-size:10px;color:var(--fg3);letter-spacing:1.2px;text-transform:uppercase;
      margin-bottom:10px;display:flex;align-items:center;gap:8px;
    }
    .ds-lbl::before{content:'##';color:var(--acc);font-size:11px;font-weight:700}

    /* FORM */
    .p-group{display:flex;flex-direction:column;gap:9px}
    .p-item label{
      display:block;font-size:10px;font-weight:600;color:var(--fg2);
      margin-bottom:5px;letter-spacing:.5px;
    }
    .req-mark{color:var(--red);margin-left:2px}
    .p-hint{font-size:10px;color:var(--fg3);margin-top:4px;line-height:1.5;padding-left:2px}
    .p-hint::before{content:'# '}

    .inp,.sel,.txa{
      width:100%;padding:8px 11px;
      background:var(--bg4);border:1px solid var(--ln2);
      border-radius:4px;color:var(--fg);font-size:11px;font-family:var(--f);
      outline:none;transition:border-color .15s;
    }
    .inp::placeholder,.txa::placeholder{color:var(--fg3)}
    .inp:focus,.sel:focus,.txa:focus{border-color:var(--acc)}
    .sel{cursor:pointer}.sel option{background:var(--bg2)}
    .txa{resize:vertical;min-height:72px;line-height:1.6}

    .btn-row{display:flex;gap:7px;margin-top:14px;flex-wrap:wrap}
    .btn-exec{
      background:var(--acc);color:var(--bg);
      padding:8px 18px;border-radius:4px;
      font-size:11px;font-weight:700;font-family:var(--f);
      border:none;cursor:pointer;letter-spacing:.3px;
      display:flex;align-items:center;gap:6px;
      transition:background .15s,transform .1s;
    }
    .btn-exec:hover{background:var(--acc2);transform:translateY(-1px)}
    .btn-exec::before{content:'▶ '}
    .btn-clr{
      background:transparent;color:var(--fg3);
      border:1px solid var(--ln2);padding:8px 14px;
      border-radius:4px;font-size:11px;font-family:var(--f);
      cursor:pointer;display:none;transition:all .15s;
    }
    .btn-clr:hover{color:var(--fg2);border-color:var(--ln3)}
    .btn-clr::before{content:'✕ '}

    /* RESPONSE */
    .resp-wrap{margin-top:14px;display:none}
    .resp-wrap.show{display:block}
    .code-blk{
      background:#0d0d12;border:1px solid var(--ln);
      border-radius:4px;overflow:hidden;margin-bottom:6px;
    }
    .code-hd{
      display:flex;align-items:center;justify-content:space-between;
      padding:6px 12px;border-bottom:1px solid var(--ln);
      background:rgba(255,255,255,.02);
    }
    .code-lbl{font-size:9px;color:var(--fg3);text-transform:uppercase;letter-spacing:1.2px}
    .code-lbl::before{content:'# '}
    .btn-cpy{
      background:transparent;border:none;color:var(--fg3);
      cursor:pointer;font-size:11px;padding:2px 7px;
      border-radius:3px;font-family:var(--f);
      display:flex;align-items:center;gap:4px;transition:all .12s;
    }
    .btn-cpy:hover{color:var(--fg2);background:var(--bg4)}
    .code-bd{
      padding:12px;overflow-x:auto;font-size:11px;
      line-height:1.65;font-family:var(--f);color:var(--fg2);
    }
    .code-bd pre{margin:0}
    .code-bd img{max-width:100%;border-radius:4px}

    /* STATUS TABLE */
    .st-tbl{width:100%;border-collapse:collapse;font-size:11px}
    .st-tbl th{
      background:var(--bg4);padding:7px 12px;text-align:left;
      font-size:9px;font-weight:600;letter-spacing:1px;text-transform:uppercase;
      color:var(--fg3);border-bottom:1px solid var(--ln);
    }
    .st-tbl th::before{content:'// '}
    .st-tbl td{padding:9px 12px;border-bottom:1px solid var(--ln);color:var(--fg2)}
    .st-tbl tr:last-child td{border-bottom:none}
    .st-tbl tr:hover td{background:var(--bg4)}
    .sc{font-family:var(--f);font-weight:700;font-size:11px}
    .sc-2xx{color:var(--grn)}.sc-4xx{color:var(--red)}.sc-429{color:var(--ylw)}.sc-5xx{color:var(--red)}

    /* DEPRECATED */
    .depr-banner{
      font-size:11px;color:var(--ylw);
      background:rgba(251,191,36,.06);
      border:1px solid rgba(251,191,36,.15);
      border-radius:4px;padding:10px 14px;
    }
    .depr-banner::before{content:'[!] '}

    /* NO RESULTS */
    #noResults{display:none;padding:48px 0;text-align:center}
    #noResults p{font-size:12px;color:var(--fg3)}
    #noResults p::before{content:'// ';color:var(--acc)}

    /* FOOTER */
    .docs-ft{
      border-top:1px solid var(--ln);margin-top:40px;
      padding:18px 0;font-size:11px;color:var(--fg3);
      display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;
    }
    .docs-ft::before{content:'// ';color:var(--acc)}
    .docs-ft a{color:var(--fg3);text-decoration:none;transition:color .15s}
    .docs-ft a:hover{color:var(--fg2)}

    /* FADE IN */
    @keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
    .fi{animation:fi .28s ease forwards}

    @media(max-width:480px){
      .ep-name{display:none}
      .hdr-back{display:none}
    }
  </style>
</head>
<body>

<div id="overlay"></div>
<aside id="sidebar">
  <div class="sb-head">
    <span class="sb-title">navigation</span>
    <button class="btn-close" id="sbClose">✕</button>
  </div>
  <div class="sb-body">
    <div class="sb-sec">
      <div class="sb-lbl">pages</div>
      <a href="/" class="sb-a">dashboard</a>
      <a href="/docs" class="sb-a">api docs</a>
      <a href="/src/openapi.json" target="_blank" class="sb-a">openapi.json</a>
    </div>
    <div class="sb-sec">
      <div class="sb-lbl">contact</div>
      <a href="https://wa.me/6282313745397" target="_blank" class="sb-a">whatsapp</a>
      <a href="https://whatsapp.com/channel/0029Vb6pfuzJf05iZHfkli44" target="_blank" class="sb-a">wa channel</a>
      <a href="https://t.me/reicdrs" target="_blank" class="sb-a">telegram</a>
    </div>
  </div>
</aside>

<header>
  <div class="hdr">
    <a href="/" class="logo">
      <span class="logo-sig">neko<em>apis</em></span>
      <span class="logo-v">v1.0</span>
    </a>
    <div class="hdr-r">
      <a href="/" class="hdr-back">← back</a>
      <button class="btn-menu" id="sbOpen">≡ menu</button>
    </div>
  </div>
</header>

<main>

  <!-- NOTIFICATIONS -->
  <div id="notif-sec" style="margin-bottom:20px">
    <div class="notif-hdr">
      <div class="notif-ttl">updates</div>
      <span class="badge" id="unread-badge"></span>
    </div>
    <div id="notif-list"></div>
  </div>

  <!-- SEARCH -->
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="endpoint path or name...">
  </div>

  <!-- API LIST -->
  <div id="apiList"></div>
  <div id="noResults"><p>no matching endpoints found</p></div>

  <div class="docs-ft">
    <span>nekoapisproject · reicdrs · © <span id="year"></span></span>
    <a href="https://t.me/reicdrs" target="_blank">support</a>
  </div>
</main>

<script>
  document.getElementById('year').textContent = new Date().getFullYear();

  // sidebar
  const sb = document.getElementById('sidebar');
  const ov = document.getElementById('overlay');
  const open  = () => { sb.classList.add('open');  ov.classList.add('show');  document.body.style.overflow='hidden'; };
  const close = () => { sb.classList.remove('open');ov.classList.remove('show');document.body.style.overflow=''; };
  document.getElementById('sbOpen').addEventListener('click', open);
  document.getElementById('sbClose').addEventListener('click', close);
  ov.addEventListener('click', close);
  document.addEventListener('keydown', e => e.key==='Escape' && close());

  // copy
  async function copyText(txt, btn) {
    const orig = btn.textContent;
    try { await navigator.clipboard.writeText(txt); btn.textContent='copied!'; }
    catch { btn.textContent='err'; }
    setTimeout(() => btn.textContent = orig, 1400);
  }

  // hljs
  function hl(el) { if (window.hljs) hljs.highlightElement(el); }

  // toggle category
  function toggleCat(i) {
    const b = document.getElementById(`cb-${i}`);
    const a = document.getElementById(`ca-${i}`);
    const show = b.classList.toggle('show');
    a.classList.toggle('open', show);
  }

  // toggle endpoint
  function toggleEp(ci,ei) {
    const d = document.getElementById(`ed-${ci}-${ei}`);
    const a = document.getElementById(`ech-${ci}-${ei}`);
    const show = d.classList.toggle('show');
    a.classList.toggle('open', show);
  }

  // colorize path — highlight {params}
  function colorPath(path) {
    return path.replace(/(\/)/g, '<span class="seg">$1</span>')
               .replace(/(\{[^}]+\})/g, '<span class="param-seg">$1</span>');
  }

  // category symbol pool
  const catSyms = ['[◈]','[⬡]','[◇]','[✦]','[▣]','[◉]','[⬢]','[◆]','[▸]','[⊞]'];

  // execute
  async function execReq(e, ci, ei, method, path) {
    e.preventDefault();
    const form  = document.getElementById(`form-${ci}-${ei}`);
    const rWrap = document.getElementById(`rw-${ci}-${ei}`);
    const rBody = document.getElementById(`rb-${ci}-${ei}`);
    const rUrl  = document.getElementById(`ru-${ci}-${ei}`);
    const rCurl = document.getElementById(`rc-${ci}-${ei}`);
    const clrBtn= document.getElementById(`clr-${ci}-${ei}`);

    rWrap.classList.add('show');
    rBody.innerHTML = '<span style="color:var(--fg3)">// running request...</span>';

    const fd = new FormData(form);
    const opts = { method: method.toUpperCase() };
    let fullPath = path;

    if (['POST','PUT','PATCH'].includes(opts.method)) {
      opts.body = fd;
    } else {
      const p = new URLSearchParams();
      for (const [k,v] of fd.entries()) if (typeof v==='string' && v) p.append(k,v);
      const qs = p.toString();
      if (qs) fullPath += (path.includes('?') ? '&' : '?') + qs;
    }

    const curl = `curl -X ${opts.method} "${window.location.origin}${fullPath}"`;
    rUrl.textContent  = window.location.origin + fullPath;
    rCurl.textContent = curl;

    try {
      const res = await fetch(fullPath, opts);
      const ct  = res.headers.get('content-type') || '';
      if (!res.ok) { const t = await res.text().catch(()=>''); throw new Error(`${res.status} ${res.statusText}\n${t}`); }

      if (ct.includes('application/json')) {
        const d = await res.json();
        rBody.innerHTML = `<pre><code class="language-json">${JSON.stringify(d,null,2)}</code></pre>`;
        setTimeout(() => hl(rBody.querySelector('code')), 0);
      } else if (ct.startsWith('image/')) {
        const blob = await res.blob();
        rBody.innerHTML = `<img src="${URL.createObjectURL(blob)}">`;
      } else {
        rBody.textContent = await res.text();
      }
    } catch(err) {
      rBody.innerHTML = `<span style="color:var(--red)">${String(err)}</span>`;
    }
    clrBtn.style.display = 'flex';
  }

  function clearResp(ci,ei) {
    document.getElementById(`rw-${ci}-${ei}`).classList.remove('show');
    document.getElementById(`clr-${ci}-${ei}`).style.display='none';
  }

  // render field
  function field(name, schema, req) {
    schema = schema || {};
    const lbl = `${name}${req ? '<span class="req-mark">*</span>' : ''}`;
    const ph  = String(schema.example ?? schema.default ?? '');
    const desc= schema.description ? `<div class="p-hint">${schema.description}</div>` : '';
    const r   = req ? 'required' : '';

    if (schema.format === 'binary') {
      let acc=''; const d=(schema.description||name).toLowerCase();
      if (d.includes('image')||d.includes('gambar')) acc='accept="image/*"';
      else if (d.includes('video')) acc='accept="video/*"';
      return `<div class="p-item"><label>${lbl}</label><input type="file" name="${name}" class="inp" ${acc} ${r}>${desc}</div>`;
    }
    if (Array.isArray(schema.enum) && schema.enum.length) {
      const opts = schema.enum.map(v=>`<option value="${v}">${v}</option>`).join('');
      return `<div class="p-item"><label>${lbl}</label><select name="${name}" class="sel" ${r}>${opts}</select>${desc}</div>`;
    }
    if (schema.type==='boolean') {
      return `<div class="p-item"><label>${lbl}</label><select name="${name}" class="sel" ${r}><option value="true">true</option><option value="false">false</option></select>${desc}</div>`;
    }
    const type = (schema.type==='number'||schema.type==='integer') ? 'number' : 'text';
    return `<div class="p-item"><label>${lbl}</label><input type="${type}" name="${name}" class="inp" placeholder="${ph.replace(/"/g,'&quot;')}" ${r}>${desc}</div>`;
  }

  // status codes table
  const stTbl = `<table class="st-tbl">
    <thead><tr><th>code</th><th>description</th></tr></thead>
    <tbody>
      <tr><td><span class="sc sc-2xx">200</span></td><td>OK — request successful</td></tr>
      <tr><td><span class="sc sc-4xx">400</span></td><td>Bad Request — invalid params</td></tr>
      <tr><td><span class="sc sc-4xx">401</span></td><td>Unauthorized — invalid/missing key</td></tr>
      <tr><td><span class="sc sc-4xx">403</span></td><td>Forbidden — no access</td></tr>
      <tr><td><span class="sc sc-4xx">404</span></td><td>Not Found</td></tr>
      <tr><td><span class="sc sc-429">429</span></td><td>Too Many Requests — rate limited</td></tr>
      <tr><td><span class="sc sc-5xx">500</span></td><td>Internal Server Error</td></tr>
      <tr><td><span class="sc sc-5xx">503</span></td><td>Service Unavailable</td></tr>
    </tbody>
  </table>`;

  // LOAD APIs
  async function loadApis() {
    const root = document.getElementById('apiList');
    try {
      const data = await fetch('/src/openapi.json').then(r=>r.json());
      const cats = {};
      (data.tags||[]).forEach(t => { cats[t.name]={name:t.name,items:[]}; });
      Object.keys(data.paths||{}).forEach(path => {
        Object.keys(data.paths[path]).forEach(method => {
          const ep  = data.paths[path][method];
          const tag = (ep.tags&&ep.tags[0]) || 'other';
          if (!cats[tag]) cats[tag]={name:tag,items:[]};
          cats[tag].items.push({
            path, method:method.toUpperCase(),
            name: ep.summary||path,
            desc: ep.description||'',
            status: ep.deprecated?'deprecated':'ready',
            parameters: ep.parameters||[],
            requestBody: ep.requestBody
          });
        });
      });

      let html='';
      Object.values(cats).forEach((cat,ci) => {
        if (!cat.items.length) return;
        const sym = catSyms[ci % catSyms.length];
        html += `
        <div class="cat-group fi" style="animation-delay:${ci*55}ms" data-category="${cat.name}">
          <button class="cat-btn" onclick="toggleCat(${ci})">
            <div class="cat-inner">
              <div class="cat-left">
                <span class="cat-sym">${sym}</span>
                <span class="cat-name">${cat.name}</span>
              </div>
              <div class="cat-meta">
                <span class="cat-count">${cat.items.length} endpoint${cat.items.length>1?'s':''}</span>
                <span class="cat-arr" id="ca-${ci}">›</span>
              </div>
            </div>
          </button>
          <div class="cat-body" id="cb-${ci}">`;

        cat.items.forEach((item,ei) => {
          // build form
          let fields='';
          item.parameters.forEach(p => fields += field(p.name, p.schema||{}, !!p.required));
          if (item.requestBody?.content) {
            const fc = item.requestBody.content;
            if (fc['multipart/form-data']) {
              const s=fc['multipart/form-data'].schema||{};
              const req=s.required||[];
              Object.keys(s.properties||{}).forEach(n => fields += field(n,s.properties[n]||{},req.includes(n)));
            }
            if (fc['application/json']) {
              fields += `<div class="p-item"><label>body <span style="color:var(--fg3)">(application/json)</span></label><textarea name="__raw_json__" class="txa" placeholder='{"key":"value"}'></textarea></div>`;
            }
          }

          html += `
            <div class="ep-item"
              data-path="${item.path}"
              data-alias="${item.name}"
              data-description="${item.desc}"
              data-category="${cat.name}">
              <button class="ep-btn" onclick="toggleEp(${ci},${ei})">
                <div class="ep-row">
                  <span class="m-pill ${item.method}">${item.method}</span>
                  <span class="ep-sep">/</span>
                  <span class="ep-path">${colorPath(item.path)}</span>
                  <div class="ep-right">
                    <span class="ep-name">${item.name}</span>
                    <span class="st-badge ${item.status==='deprecated'?'st-deprecated':'st-ready'}">${item.status}</span>
                    <span class="ep-chev" id="ech-${ci}-${ei}">›</span>
                  </div>
                </div>
              </button>

              <div class="ep-detail" id="ed-${ci}-${ei}">
                ${item.desc ? `<div class="ep-desc">${item.desc}</div>` : ''}

                ${item.status!=='deprecated' ? `
                <div class="ds">
                  <div class="ds-lbl">try it out</div>
                  <form id="form-${ci}-${ei}" onsubmit="execReq(event,${ci},${ei},'${item.method}','${item.path}')">
                    ${fields ? `<div class="p-group">${fields}</div>` : ''}
                    <div class="btn-row">
                      <button type="submit" class="btn-exec">execute</button>
                      <button type="button" class="btn-clr" id="clr-${ci}-${ei}" style="display:none" onclick="clearResp(${ci},${ei})">clear</button>
                    </div>
                  </form>
                  <div class="resp-wrap" id="rw-${ci}-${ei}">
                    <div class="code-blk" style="margin-top:12px">
                      <div class="code-hd"><span class="code-lbl">request url</span><button class="btn-cpy" onclick="copyText(document.getElementById('ru-${ci}-${ei}').textContent,this)">copy</button></div>
                      <div class="code-bd"><code id="ru-${ci}-${ei}"></code></div>
                    </div>
                    <div class="code-blk">
                      <div class="code-hd"><span class="code-lbl">curl</span><button class="btn-cpy" onclick="copyText(document.getElementById('rc-${ci}-${ei}').textContent,this)">copy</button></div>
                      <div class="code-bd"><code id="rc-${ci}-${ei}"></code></div>
                    </div>
                    <div class="code-blk">
                      <div class="code-hd"><span class="code-lbl">response</span><button class="btn-cpy" onclick="copyText(document.getElementById('rb-${ci}-${ei}').innerText,this)">copy</button></div>
                      <div class="code-bd" id="rb-${ci}-${ei}"></div>
                    </div>
                  </div>
                </div>` : `<div class="depr-banner">endpoint ini sudah deprecated dan tidak digunakan lagi.</div>`}

                <div class="ds" style="margin-top:${item.status!=='deprecated'?'0':'14px'}">
                  <div class="ds-lbl">http status codes</div>
                  <div class="code-blk">${stTbl}</div>
                </div>
              </div>
            </div>`;
        });

        html += `</div></div>`;
      });

      root.innerHTML = html;
    } catch(err) {
      root.innerHTML = `<p style="color:var(--red);font-size:12px;padding:16px 0">// failed to load api data: ${err.message}</p>`;
    }
  }

  // LOAD NOTIFS
  async function loadNotifs() {
    const list  = document.getElementById('notif-list');
    const badge = document.getElementById('unread-badge');
    try {
      let ns = await fetch(`/src/notifications.json?t=${Date.now()}`).then(r=>r.json());
      if (!Array.isArray(ns)) ns = ns ? [ns] : [];
      ns.sort((a,b) => new Date(b.date||0)-new Date(a.date||0));
      if (!ns.length) { list.innerHTML='<div style="font-size:11px;color:var(--fg3);padding:4px 0">// no new updates</div>'; return; }
      let unread=0;
      ns.forEach((n,i) => {
        if (!n.read) unread++;
        const el = document.createElement('div');
        el.className='notif-item fi';
        el.style.animationDelay=`${i*40}ms`;
        if (n.read) el.style.opacity='.55';
        el.innerHTML=`<div class="notif-row">
          <div><div class="notif-body-title">${n.title||'update'}</div><div class="notif-body-msg">${n.message||''}</div></div>
          <div class="notif-meta">${!n.read?'<div class="notif-dot"></div>':''}<div class="notif-date">${n.date?new Date(n.date).toLocaleDateString('id-ID',{day:'numeric',month:'short'}):''}</div></div>
        </div>`;
        list.appendChild(el);
      });
      if (unread>0){badge.textContent=unread;badge.style.display='inline-block';}
    } catch {
      list.innerHTML='<div style="font-size:11px;color:var(--red)">// gagal memuat notifikasi</div>';
    }
  }

  // SEARCH
  document.getElementById('searchInput').addEventListener('input', function() {
    const q=this.value.toLowerCase();let n=0;
    document.querySelectorAll('.ep-item').forEach(el => {
      const ok=[el.dataset.path,el.dataset.alias,el.dataset.description].some(s=>s.toLowerCase().includes(q));
      el.style.display=ok?'':'none'; if(ok)n++;
    });
    document.querySelectorAll('.cat-group').forEach(g => {
      const vis=[...g.querySelectorAll('.ep-item')].some(i=>i.style.display!=='none');
      g.style.display=vis?'':'none';
    });
    document.getElementById('noResults').style.display=n===0?'block':'none';
  });

  document.addEventListener('DOMContentLoaded', () => { loadApis(); loadNotifs(); });
</script>
</body>
</html>
